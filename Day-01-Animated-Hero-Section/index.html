<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day 01 — Animated Hero Section</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --ink: #0e0e0e;
    --cream: #f5f0e8;
    --rust: #c94b2a;
    --gold: #d4a843;
    --muted: #7a7060;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    cursor: none;
  }

  /* Custom cursor */
  .cursor {
    position: fixed;
    width: 10px; height: 10px;
    background: var(--rust);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s, width 0.3s, height 0.3s, background 0.3s;
  }
  .cursor-ring {
    position: fixed;
    width: 36px; height: 36px;
    border: 1.5px solid var(--rust);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: transform 0.08s linear, width 0.3s, height 0.3s, opacity 0.3s;
    opacity: 0.5;
  }

  /* Animated background */
  .hero {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Animated grain overlay */
  .hero::after {
    content: '';
    position: absolute;
    inset: -50%;
    width: 200%; height: 200%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 10;
    animation: grain 0.5s steps(2) infinite;
  }

  @keyframes grain {
    0%   { transform: translate(0, 0); }
    25%  { transform: translate(-2%, -3%); }
    50%  { transform: translate(1%, 2%); }
    75%  { transform: translate(-1%, 1%); }
    100% { transform: translate(2%, -1%); }
  }

  /* Floating orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.18;
    animation: drift linear infinite;
  }
  .orb-1 {
    width: 500px; height: 500px;
    background: var(--rust);
    top: -150px; right: -100px;
    animation-duration: 18s;
    animation-direction: alternate;
  }
  .orb-2 {
    width: 350px; height: 350px;
    background: var(--gold);
    bottom: -100px; left: -80px;
    animation-duration: 14s;
    animation-direction: alternate-reverse;
    animation-delay: -4s;
  }
  .orb-3 {
    width: 250px; height: 250px;
    background: var(--ink);
    top: 40%; left: 30%;
    animation-duration: 22s;
    opacity: 0.06;
  }

  @keyframes drift {
    0%   { transform: translate(0, 0) scale(1); }
    33%  { transform: translate(40px, -30px) scale(1.05); }
    66%  { transform: translate(-20px, 40px) scale(0.97); }
    100% { transform: translate(30px, 20px) scale(1.02); }
  }

  /* Diagonal stripe lines */
  .stripes {
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 60px,
      rgba(14,14,14,0.025) 60px,
      rgba(14,14,14,0.025) 61px
    );
    pointer-events: none;
  }

  /* Rotating ring */
  .ring {
    position: absolute;
    width: 600px; height: 600px;
    border: 1px solid rgba(201,75,42,0.12);
    border-radius: 50%;
    right: -200px; top: 50%;
    transform: translateY(-50%);
    animation: spin 30s linear infinite;
  }
  .ring::before {
    content: '';
    position: absolute;
    inset: 40px;
    border: 1px dashed rgba(201,75,42,0.08);
    border-radius: 50%;
    animation: spin 20s linear infinite reverse;
  }
  @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }

  /* Content */
  .content {
    position: relative;
    z-index: 5;
    max-width: 900px;
    padding: 0 40px;
    text-align: left;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--rust);
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.2s forwards;
  }
  .eyebrow::before {
    content: '';
    display: block;
    width: 30px; height: 1px;
    background: var(--rust);
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(5rem, 13vw, 11rem);
    line-height: 0.9;
    letter-spacing: -1px;
    color: var(--ink);
    margin-bottom: 30px;
    opacity: 0;
    animation: fadeUp 0.9s ease 0.4s forwards;
  }

  h1 .outline {
    -webkit-text-stroke: 2px var(--ink);
    color: transparent;
  }

  h1 .accent {
    color: var(--rust);
  }

  .desc {
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 300;
    color: var(--muted);
    line-height: 1.7;
    max-width: 420px;
    margin-bottom: 44px;
    opacity: 0;
    animation: fadeUp 0.9s ease 0.6s forwards;
  }

  .actions {
    display: flex;
    align-items: center;
    gap: 24px;
    opacity: 0;
    animation: fadeUp 0.9s ease 0.8s forwards;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--cream);
    background: var(--ink);
    border: none;
    padding: 16px 32px;
    cursor: none;
    text-decoration: none;
    position: relative;
    overflow: hidden;
    transition: color 0.4s;
  }

  .btn-primary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--rust);
    transform: translateX(-101%);
    transition: transform 0.4s cubic-bezier(.4,0,.2,1);
  }

  .btn-primary:hover::before { transform: translateX(0); }
  .btn-primary span { position: relative; z-index: 1; }

  .btn-arrow {
    display: inline-block;
    position: relative;
    z-index: 1;
    transition: transform 0.3s;
  }
  .btn-primary:hover .btn-arrow { transform: translateX(4px); }

  .btn-ghost {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--muted);
    background: none;
    border: none;
    cursor: none;
    text-decoration: none;
    letter-spacing: 0.5px;
    position: relative;
    transition: color 0.3s;
  }
  .btn-ghost::after {
    content: '';
    position: absolute;
    bottom: -2px; left: 0;
    width: 0; height: 1px;
    background: var(--ink);
    transition: width 0.3s;
  }
  .btn-ghost:hover { color: var(--ink); }
  .btn-ghost:hover::after { width: 100%; }

  /* Scroll indicator */
  .scroll-hint {
    position: absolute;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 0;
    animation: fadeUp 1s ease 1.2s forwards;
    z-index: 5;
  }

  .scroll-line {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, var(--muted), transparent);
    animation: scrollPulse 2s ease infinite;
  }

  @keyframes scrollPulse {
    0%, 100% { transform: scaleY(1); opacity: 0.5; }
    50% { transform: scaleY(0.6); opacity: 1; }
  }

  /* Corner label */
  .corner-label {
    position: absolute;
    top: 36px; right: 40px;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 0;
    animation: fadeIn 1s ease 1s forwards;
    z-index: 5;
  }

  /* Day badge */
  .day-badge {
    position: absolute;
    top: 36px; left: 40px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0;
    animation: fadeIn 1s ease 1s forwards;
    z-index: 5;
  }

  .day-dot {
    width: 6px; height: 6px;
    background: var(--rust);
    border-radius: 50%;
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.5); opacity: 0.6; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* Hover grow on title */
  h1:hover .outline {
    -webkit-text-stroke-color: var(--rust);
    transition: -webkit-text-stroke-color 0.3s;
  }

  /* ================================
     MOBILE RESPONSIVE — Media Queries
     Think of these as "IF screen is
     smaller than X, apply these rules"
  ================================ */

  /* Tablet — screens up to 768px wide */
  @media (max-width: 768px) {

    /* Show normal cursor on touch devices */
    html, body { cursor: auto; }
    .cursor, .cursor-ring { display: none; }
    .btn-primary, .btn-ghost { cursor: pointer; }

    /* Make hero scrollable on small screens */
    html, body { overflow: auto; }
    .hero {
      height: auto;
      min-height: 100vh;
      padding: 100px 0 80px; /* top space for the badge */
      align-items: flex-start;
    }

    /* Move badge & label closer to edges */
    .day-badge  { top: 24px; left: 20px; }
    .corner-label { top: 24px; right: 20px; }

    /* Content padding on sides */
    .content {
      padding: 0 24px;
      text-align: center; /* center everything on mobile */
    }

    /* Center the eyebrow line */
    .eyebrow {
      justify-content: center;
      margin-bottom: 20px;
    }

    /* Title size — clamp handles this automatically
       but we reduce the min size for small phones */
    h1 {
      font-size: clamp(3.5rem, 18vw, 7rem);
      margin-bottom: 20px;
    }

    /* Description — full width, center aligned */
    .desc {
      max-width: 100%;
      font-size: 15px;
      margin-bottom: 32px;
      text-align: center;
    }

    /* Stack buttons vertically on mobile */
    .actions {
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    /* Make primary button full width */
    .btn-primary {
      width: 100%;
      max-width: 280px;
      justify-content: center;
    }

    /* Shrink the decorative ring */
    .ring {
      width: 320px; height: 320px;
      right: -160px;
    }

    /* Shrink orbs so they don't dominate */
    .orb-1 { width: 280px; height: 280px; top: -80px; right: -60px; }
    .orb-2 { width: 200px; height: 200px; bottom: -60px; left: -50px; }

    /* Move scroll hint up a little */
    .scroll-hint { bottom: 20px; }
  }

  /* Small phones — screens up to 480px */
  @media (max-width: 480px) {

    .hero { padding: 90px 0 70px; }

    .day-badge  { font-size: 9px; left: 16px; top: 20px; }
    .corner-label { font-size: 9px; right: 16px; top: 20px; }

    .content { padding: 0 20px; }

    h1 {
      font-size: clamp(3rem, 20vw, 5rem);
      line-height: 0.95;
    }

    /* Thinner stroke on small screens */
    h1 .outline { -webkit-text-stroke-width: 1.5px; }

    .desc { font-size: 14px; line-height: 1.65; }

    .eyebrow { font-size: 10px; letter-spacing: 2px; }

    .btn-primary { padding: 14px 28px; font-size: 12px; }

    /* Hide scroll hint on very small screens — saves space */
    .scroll-hint { display: none; }

    .orb-1 { width: 200px; height: 200px; }
    .orb-2 { width: 160px; height: 160px; }
    .orb-3 { display: none; } /* hide the subtle orb */
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<section class="hero">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="stripes"></div>
  <div class="ring"></div>

  <div class="day-badge">
    <div class="day-dot"></div>
    Day 01 / 30
  </div>

  <div class="corner-label">HTML Challenge</div>

  <div class="content">
    <div class="eyebrow">Animated Hero Section</div>
    <h1>
      CRAFT<br>
      <span class="outline">BOLD</span><br>
      <span class="accent">STORIES.</span>
    </h1>
    <p class="desc">
      A full-viewport hero built with pure CSS animations, custom cursor,
      floating orbs, and staggered entrance transitions — no libraries needed.
    </p>
    <div class="actions">
      <a href="#" class="btn-primary">
        <span>View Project</span>
        <span class="btn-arrow">→</span>
      </a>
      <a href="https://github.com" class="btn-ghost">GitHub Repo</a>
    </div>
  </div>

  <div class="scroll-hint">
    <div class="scroll-line"></div>
    Scroll
  </div>
</section>

<script>
  // Only run custom cursor on devices that have a mouse (not touch screens)
  const isTouchDevice = window.matchMedia('(pointer: coarse)').matches;

  if (!isTouchDevice) {
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');

    let mx = window.innerWidth / 2, my = window.innerHeight / 2;
    let rx = mx, ry = my;

    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      cursor.style.left = mx + 'px';
      cursor.style.top  = my + 'px';
    });

    // Smooth ring follow
    function animateRing() {
      rx += (mx - rx) * 0.12;
      ry += (my - ry) * 0.12;
      ring.style.left = rx + 'px';
      ring.style.top  = ry + 'px';
      requestAnimationFrame(animateRing);
    }
    animateRing();

    // Scale cursor on hoverable elements
    document.querySelectorAll('a, button').forEach(el => {
      el.addEventListener('mouseenter', () => {
        cursor.style.width = '6px';
        cursor.style.height = '6px';
        ring.style.width = '52px';
        ring.style.height = '52px';
        ring.style.opacity = '0.8';
      });
      el.addEventListener('mouseleave', () => {
        cursor.style.width = '10px';
        cursor.style.height = '10px';
        ring.style.width = '36px';
        ring.style.height = '36px';
        ring.style.opacity = '0.5';
      });
    });
  }
</script>
</body>
</html>
