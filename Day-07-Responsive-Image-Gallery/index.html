<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day 07 — Image Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', sans-serif;
    background: #f5f5f5;
    padding: 40px 24px 80px;
  }

  h1 {
    text-align: center;
    font-size: 2rem;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 8px;
  }

  .sub {
    text-align: center;
    font-size: 14px;
    color: #999;
    margin-bottom: 32px;
  }

  /* ── Filter Buttons ── */
  .filters {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }

  .btn {
    font-family: 'Poppins', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 22px;
    border-radius: 100px;
    border: 2px solid #e0e0e0;
    background: #fff;
    color: #888;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn:hover { border-color: #333; color: #333; }
  .btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 960px;
    margin: 0 auto;
  }

  /* ── Card ── */
  .card {
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.25s, box-shadow 0.25s;
    position: relative;
    background: #e0e0e0;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.15);
  }

  .card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
    transition: transform 0.3s;
  }

  .card:hover img { transform: scale(1.05); }

  .card-label {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 28px 14px 12px;
    background: linear-gradient(transparent, rgba(0,0,0,0.65));
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.25s;
  }

  .card:hover .card-label { opacity: 1; }

  .card.hidden { display: none; }

  /* ── Lightbox ── */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }

  .lightbox.open { opacity: 1; pointer-events: all; }

  .lb-box {
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    max-width: 620px;
    width: 100%;
    transform: scale(0.96);
    transition: transform 0.25s;
  }

  .lightbox.open .lb-box { transform: scale(1); }

  .lb-box img {
    width: 100%;
    height: 380px;
    object-fit: cover;
    display: block;
  }

  .lb-footer {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .lb-title { font-size: 15px; font-weight: 600; color: #1a1a1a; }
  .lb-tag   { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: #999; }

  .lb-close {
    position: absolute;
    top: 12px; right: 12px;
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    background: #fff;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s;
  }

  .lb-close:hover { transform: rotate(90deg); }

  .lb-nav {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    width: 42px; height: 42px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.18);
    color: #fff;
    font-size: 22px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
    backdrop-filter: blur(4px);
  }

  .lb-nav:hover { background: rgba(255,255,255,0.32); }
  .lb-prev { left: 12px; }
  .lb-next { right: 12px; }

  .day-badge {
    position: fixed;
    bottom: 20px; right: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #aaa;
    background: #fff;
    border: 1px solid #eee;
    padding: 6px 14px;
    border-radius: 20px;
  }

  @media (max-width: 700px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 440px) {
    .grid { grid-template-columns: 1fr; }
    .lb-box img { height: 260px; }
  }
</style>
</head>
<body>

<h1>Photo Gallery</h1>
<p class="sub" id="countText">12 photos</p>

<div class="filters">
  <button class="btn active" data-filter="all">All</button>
  <button class="btn" data-filter="nature">Nature</button>
</div>

<div class="grid" id="grid"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLb()">✕</button>
  <button class="lb-nav lb-prev" onclick="nav(-1)">‹</button>
  <button class="lb-nav lb-next" onclick="nav(1)">›</button>
  <div class="lb-box">
    <img id="lbImg" src="" alt="">
    <div class="lb-footer">
      <span class="lb-title" id="lbTitle"></span>
      <span class="lb-tag"   id="lbTag"></span>
    </div>
  </div>
</div>

<div class="day-badge">Day 07 / 30</div>

<script>
  // Unsplash Source API — free, no API key needed
  // Format: https://source.unsplash.com/[width]x[height]/?[keyword]&sig=[unique]
  const photos = [
    { title: 'City at Night',   cat: 'city',     url: 'https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=600&q=80' },
    { title: 'Abstract Waves',  cat: 'abstract', url: 'https://images.unsplash.com/photo-1557672172-298e090bd0f1?w=600&q=80' },
    { title: 'Mountain Lake',   cat: 'nature',   url: 'https://images.unsplash.com/photo-1501854140801-50d01698950b?w=600&q=80' },
    { title: 'Street Life',     cat: 'city',     url: 'https://images.unsplash.com/photo-1519501025264-65ba15a82390?w=600&q=80' },
    { title: 'Colour Smoke',    cat: 'abstract', url: 'https://images.unsplash.com/photo-1550859492-d5da9d8e45f3?w=600&q=80' },
    { title: 'Misty Valley',    cat: 'nature',   url: 'https://images.unsplash.com/photo-1465146344425-f00d5f5c8f07?w=600&q=80' },
    { title: 'Bridge Lights',   cat: 'city',     url: 'https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=600&q=80&sig=2' },
    { title: 'Paint Pour',      cat: 'abstract', url: 'https://images.unsplash.com/photo-1541701494587-cb58502866ab?w=600&q=80' },
    { title: 'Waterfall',       cat: 'nature',   url: 'https://images.unsplash.com/photo-1432405972618-c60b0225b8f9?w=600&q=80' },
    { title: 'Neon Glow',       cat: 'abstract', url: 'https://images.unsplash.com/photo-1563089145-599997674d42?w=600&q=80' },
  ];

  let visible = [...photos];
  let current = 0;

  function buildGrid(filter) {
    visible = filter === 'all' ? photos : photos.filter(p => p.cat === filter);
    document.getElementById('countText').textContent = visible.length + ' photos';

    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    visible.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img src="${p.url}" alt="${p.title}" loading="lazy">
        <div class="card-label">${p.title}</div>
      `;
      card.onclick = () => openLb(i);
      grid.appendChild(card);
    });
  }

  function openLb(i) {
    current = i;
    updateLb();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLb() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function updateLb() {
    const p = visible[current];
    document.getElementById('lbImg').src = p.url;
    document.getElementById('lbImg').alt = p.title;
    document.getElementById('lbTitle').textContent = p.title;
    document.getElementById('lbTag').textContent   = p.cat;
  }

  function nav(dir) {
    current = (current + dir + visible.length) % visible.length;
    updateLb();
  }

  document.querySelectorAll('.btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      buildGrid(btn.dataset.filter);
    };
  });

  document.getElementById('lightbox').onclick = function(e) {
    if (e.target === this) closeLb();
  };

  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape')     closeLb();
    if (e.key === 'ArrowRight') nav(1);
    if (e.key === 'ArrowLeft')  nav(-1);
  });

  buildGrid('all');
</script>
</body>
</html>
