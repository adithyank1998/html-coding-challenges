<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day 10 — CSS Loaders</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    padding: 48px 24px 80px;
  }

  h1 {
    text-align: center;
    font-size: 2rem;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 8px;
  }

  .sub {
    text-align: center;
    font-size: 14px;
    color: #999;
    margin-bottom: 48px;
  }

  /* ── Grid of loader cards ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    max-width: 960px;
    margin: 0 auto;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 36px 20px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 28px rgba(0,0,0,0.10);
  }

  .card-name {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    color: #999;
    text-align: center;
  }

  /* ══════════════════════════
     1. SPINNER
  ══════════════════════════ */
  .spinner {
    width: 44px; height: 44px;
    border: 4px solid #e0e0e0;
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ══════════════════════════
     2. DOTS
  ══════════════════════════ */
  .dots {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #6366f1;
    animation: dotBounce 0.6s ease-in-out infinite alternate;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dotBounce {
    from { transform: translateY(0);    opacity: 1; }
    to   { transform: translateY(-14px); opacity: 0.4; }
  }

  /* ══════════════════════════
     3. PULSE
  ══════════════════════════ */
  .pulse {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: #6366f1;
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1);   opacity: 1; }
    50%       { transform: scale(1.5); opacity: 0.3; }
  }

  /* ══════════════════════════
     4. BARS
  ══════════════════════════ */
  .bars {
    display: flex;
    gap: 5px;
    align-items: flex-end;
    height: 44px;
  }

  .bar {
    width: 8px;
    background: #6366f1;
    border-radius: 4px;
    animation: barGrow 0.8s ease-in-out infinite alternate;
  }

  .bar:nth-child(1) { animation-delay: 0s;    height: 20px; }
  .bar:nth-child(2) { animation-delay: 0.15s; height: 30px; }
  .bar:nth-child(3) { animation-delay: 0.3s;  height: 44px; }
  .bar:nth-child(4) { animation-delay: 0.15s; height: 30px; }
  .bar:nth-child(5) { animation-delay: 0s;    height: 20px; }

  @keyframes barGrow {
    from { transform: scaleY(0.3); opacity: 0.4; }
    to   { transform: scaleY(1);   opacity: 1; }
  }

  /* ══════════════════════════
     5. RING
  ══════════════════════════ */
  .ring {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 4px solid transparent;
    border-top-color: #6366f1;
    border-right-color: #6366f1;
    animation: spin 1s linear infinite;
  }

  /* ══════════════════════════
     6. SQUARE ROTATE
  ══════════════════════════ */
  .square {
    width: 36px; height: 36px;
    background: #6366f1;
    border-radius: 6px;
    animation: squareSpin 1.2s ease-in-out infinite;
  }

  @keyframes squareSpin {
    0%   { transform: rotate(0deg)   scale(1); }
    50%  { transform: rotate(180deg) scale(0.6); }
    100% { transform: rotate(360deg) scale(1); }
  }

  /* ══════════════════════════
     7. RIPPLE
  ══════════════════════════ */
  .ripple {
    position: relative;
    width: 44px; height: 44px;
  }

  .ripple::before,
  .ripple::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 3px solid #6366f1;
    animation: rippleAnim 1.6s ease-out infinite;
  }

  .ripple::after { animation-delay: 0.8s; }

  @keyframes rippleAnim {
    0%   { transform: scale(0); opacity: 1; }
    100% { transform: scale(2); opacity: 0; }
  }

  /* ══════════════════════════
     8. PROGRESS BAR
  ══════════════════════════ */
  .progress-wrap {
    width: 100%;
    height: 6px;
    background: #e0e0e0;
    border-radius: 100px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: #6366f1;
    border-radius: 100px;
    animation: progress 1.8s ease-in-out infinite;
  }

  @keyframes progress {
    0%   { width: 0%;   margin-left: 0; }
    50%  { width: 60%;  margin-left: 20%; }
    100% { width: 0%;   margin-left: 100%; }
  }

  /* Day badge */
  .day-badge {
    position: fixed;
    bottom: 20px; right: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #aaa;
    background: #fff;
    border: 1px solid #eee;
    padding: 6px 14px;
    border-radius: 20px;
  }

  @media (max-width: 720px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 400px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<h1>CSS Loader Pack</h1>
<p class="sub">8 pure CSS loading animations — no JavaScript</p>

<div class="grid">

  <div class="card">
    <div class="spinner"></div>
    <span class="card-name">Spinner</span>
  </div>

  <div class="card">
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <span class="card-name">Bouncing Dots</span>
  </div>

  <div class="card">
    <div class="pulse"></div>
    <span class="card-name">Pulse</span>
  </div>

  <div class="card">
    <div class="bars">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
    <span class="card-name">Audio Bars</span>
  </div>

  <div class="card">
    <div class="ring"></div>
    <span class="card-name">Ring</span>
  </div>

  <div class="card">
    <div class="square"></div>
    <span class="card-name">Square Spin</span>
  </div>

  <div class="card">
    <div class="ripple"></div>
    <span class="card-name">Ripple</span>
  </div>

  <div class="card" style="justify-content: center;">
    <div class="progress-wrap" style="width:80%">
      <div class="progress-bar"></div>
    </div>
    <span class="card-name">Progress Bar</span>
  </div>

</div>

<div class="day-badge">Day 10 / 30</div>

</body>
</html>
